  <path d="M672 362L684 374L672 386" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M970 362L982 374L970 386" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="88" y="622" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="15">Open source, MIT licensed, Flask + SQLite + JSON + vanilla JS.</text>
